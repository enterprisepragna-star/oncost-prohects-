<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ONCOST</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <main class="auth-shell">
    <form class="auth-card form-grid" data-login-form>
      <a class="logo" href="index.html">ONCOST</a>
      <div><p class="eyebrow">Customer login</p><h2>Welcome back</h2><p>Login to view product details, cart, account, and enquiry modules.</p></div>
      <label>Email <input class="field" required type="email" name="email" placeholder="customer@example.com"></label>
      <label>Password <input class="field" required type="password" name="password" placeholder="Enter password"></label>
      <button class="button primary" type="submit">Login</button>
      <p>New customer? <a href="signup.html"><strong>Create an account</strong></a></p>
    </form>
  </main>
  <script src="app.js"></script>
</body>
</html>
