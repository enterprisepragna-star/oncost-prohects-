<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · ONCOST</title>
  <link rel="stylesheet" href="storefront.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
</head>
<body style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--cream),var(--gold-soft));padding:20px;">
  <div style="max-width:420px;width:100%;background:#FFF;padding:36px;border-radius:14px;box-shadow:var(--shadow-lg);border:1px solid var(--line);">
    <a href="index.html" style="display:block;text-align:center;font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--burgundy);letter-spacing:3px;margin-bottom:6px;">ONCOST</a>
    <div style="text-align:center;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:24px;">Welcome back</div>
    <h2 style="text-align:center;font-size:1.6rem;margin-bottom:24px;">Sign In</h2>
    <div id="err" style="background:#fbecec;color:var(--error);border:1px solid #e8c1c1;padding:10px;border-radius:6px;font-size:13px;margin-bottom:14px;display:none;"></div>
    <form id="login-form" style="display:flex;flex-direction:column;gap:14px;">
      <label style="font-size:12px;font-weight:600;color:var(--ink-soft);letter-spacing:1px;text-transform:uppercase;">Email
        <input class="field" type="email" id="email" required placeholder="you@example.com" style="margin-top:6px;width:100%;" />
      </label>
      <label style="font-size:12px;font-weight:600;color:var(--ink-soft);letter-spacing:1px;text-transform:uppercase;">Password
        <input class="field" type="password" id="password" required placeholder="••••••••" style="margin-top:6px;width:100%;" />
      </label>
      <button class="btn primary" type="submit" id="btn"><i class="fas fa-right-to-bracket"></i> Sign In</button>
    </form>
    <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--muted);">
      New here? <a href="signup.html" style="color:var(--burgundy);font-weight:600;">Create an account</a>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:12px;"><a href="index.html" style="color:var(--muted);">← Back to store</a></div>
  </div>

  <script>
    const f = document.getElementById('login-form');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';

    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) location.href = redirect;
    });

    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      btn.disabled = true; btn.innerHTML = 'Signing in…';
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: document.getElementById('email').value.trim().toLowerCase(),
        password: document.getElementById('password').value,
      });
      if (error) { err.textContent = error.message; err.style.display = 'block'; btn.disabled = false; btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In'; return; }
      location.href = redirect;
    });
  </script>
</body>
</html>
