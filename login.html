<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ONCOST</title>
  <meta name="description" content="Login to your ONCOST account to browse products, manage your cart, and submit enquiries.">
  <link rel="stylesheet" href="site.css">
  <style>
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .auth-tab {
      flex: 1;
      padding: 11px;
      background: #fff;
      border: none;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 150ms;
    }
    .auth-tab.active {
      background: var(--burgundy);
      color: #fff;
    }
    .auth-panel { display: none; }
    .auth-panel.active { display: contents; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .otp-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .otp-row .button {
      min-height: 48px;
      white-space: nowrap;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .social-hint {
      text-align: center;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <div class="auth-card form-grid">
      <a class="logo" href="index.html" aria-label="ONCOST home">ONCOST</a>

      <div>
        <p class="eyebrow">Customer login</p>
        <h2>Welcome back</h2>
        <p>Login to view product details, manage your cart, and submit event enquiries.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-email">Email Login</button>
        <button class="auth-tab" id="tab-otp">Mobile OTP</button>
      </div>

      <!-- Email Login -->
      <form data-login-form id="panel-email" class="auth-panel active form-grid" novalidate>
        <label>Email address
          <input class="field" required type="email" name="email" placeholder="customer@example.com" autocomplete="email">
        </label>
        <label>Password
          <input class="field" required type="password" name="password" placeholder="Your password" autocomplete="current-password">
        </label>
        <button class="button primary" type="submit">Login to ONCOST</button>
        <div class="social-hint">
          New customer? <a href="signup.html"><strong>Create a free account</strong></a>
        </div>
      </form>

      <!-- OTP Login -->
      <form data-login-otp id="panel-otp" class="auth-panel form-grid" novalidate>
        <label>Mobile number
          <div class="otp-row">
            <input class="field" required name="phone" placeholder="+91 9876543210" type="tel" autocomplete="tel">
            <button class="button secondary" data-request-otp type="button">Send OTP</button>
          </div>
        </label>
        <label>Enter OTP
          <input class="field" name="otp" placeholder="6-digit OTP" inputmode="numeric" maxlength="6">
        </label>
        <button class="button primary" type="submit">Verify &amp; Login</button>
        <p style="font-size:0.82rem;color:var(--muted);text-align:center;margin:0">Demo mode — OTP appears as an alert. No SMS is sent.</p>
        <div class="social-hint">
          New customer? <a href="signup.html"><strong>Create a free account</strong></a>
        </div>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    // Tab switching
    var tabEmail = document.getElementById('tab-email');
    var tabOtp = document.getElementById('tab-otp');
    var panelEmail = document.getElementById('panel-email');
    var panelOtp = document.getElementById('panel-otp');

    tabEmail.addEventListener('click', function () {
      tabEmail.classList.add('active');
      tabOtp.classList.remove('active');
      panelEmail.classList.add('active');
      panelOtp.classList.remove('active');
    });
    tabOtp.addEventListener('click', function () {
      tabOtp.classList.add('active');
      tabEmail.classList.remove('active');
      panelOtp.classList.add('active');
      panelEmail.classList.remove('active');
    });
  </script>
</body>
</html>
