<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | ONCOST</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <main class="auth-shell">
    <form class="auth-card form-grid" data-signup-form>
      <a class="logo" href="index.html">ONCOST</a>
      <div><p class="eyebrow">Create account</p><h2>Start gifting with ONCOST</h2><p>Create a demo customer account to unlock products and cart modules.</p></div>
      <label>Name <input class="field" required name="name" placeholder="Your name"></label>
      <label>Email <input class="field" required type="email" name="email" placeholder="customer@example.com"></label>
      <label>Phone <input class="field" required name="phone" placeholder="Mobile number"></label>
      <label>Password <input class="field" required type="password" name="password" placeholder="Create password"></label>
      <button class="button primary" type="submit">Create Account</button>
      <p>Already registered? <a href="login.html"><strong>Login</strong></a></p>
    </form>
  </main>
  <script src="app.js"></script>
</body>
</html>
