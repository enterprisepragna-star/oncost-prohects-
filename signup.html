<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | ONCOST</title>
  <link rel="stylesheet" href="site.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    .pro-auth-body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        background-color: #F7F8FA;
        font-family: 'Inter', sans-serif;
    }
    .pro-auth-container {
        background-color: white;
        width: 100%;
        max-width: 440px;
        padding: 48px 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 2px 10px rgba(0, 0, 0, 0.02);
    }
    .pro-auth-header {
        text-align: center;
        margin-bottom: 32px;
    }
    .pro-auth-logo {
        color: #7B2A3A;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 4px;
        text-decoration: none;
        display: block;
    }
    .pro-auth-subtitle {
        color: #7B2A3A;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .pro-auth-welcome h1 {
        color: #1A1A1A;
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 8px 0;
        font-family: 'Inter', sans-serif;
    }
    .pro-auth-welcome p {
        color: #666666;
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 24px;
    }
    .pro-form-group {
        margin-bottom: 20px;
    }
    .pro-form-group label {
        display: block;
        color: #1A1A1A;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
    }
    .pro-form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #E0E0E0;
        border-radius: 8px;
        font-size: 15px;
        color: #1A1A1A;
        transition: all 0.2s ease;
        outline: none;
        font-family: 'Inter', sans-serif;
    }
    .pro-form-group input:focus {
        border-color: #7B2A3A;
        box-shadow: 0 0 0 3px rgba(123, 42, 58, 0.1);
    }
    .pro-form-group input:invalid:not(:placeholder-shown) {
        border-color: #D32F2F;
    }
    .pro-btn {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        border: none;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Inter', sans-serif;
    }
    .pro-btn-primary {
        background-color: #7B2A3A;
        color: white;
        margin-top: 10px;
    }
    .pro-btn-primary:hover {
        background-color: #5A1E2A;
    }
    .pro-footer-links {
        text-align: center;
        margin-top: 32px;
        font-size: 14px;
        color: #666666;
    }
    .pro-footer-links a {
        color: #7B2A3A;
        font-weight: 600;
        text-decoration: none;
        transition: color 0.2s ease;
    }
    .pro-footer-links a:hover {
        text-decoration: underline;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
</head>
<body class="pro-auth-body">
  <div class="pro-auth-container">
    <div class="pro-auth-header">
      <a href="index.html" class="pro-auth-logo">ONCOST</a>
      <div class="pro-auth-subtitle">Create Account</div>
    </div>

    <div class="pro-auth-welcome">
      <h1>Start gifting with ONCOST</h1>
      <p>Create your customer account to unlock products and cart modules.</p>
    </div>

    <form action="#" method="POST" data-signup-form>
      <div class="pro-form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>

      <div class="pro-form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="customer@example.com" required>
      </div>

      <div class="pro-form-group">
        <label for="phone">Phone</label>
        <!-- 10 digit phone number validation -->
        <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" required pattern="[0-9]{10}" title="Please enter exactly 10 digits">
      </div>

      <div class="pro-form-group">
        <label for="password">Password</label>
        <!-- 8 character min length validation -->
        <input type="password" id="password" name="password" placeholder="Create password (min 8 characters)" required minlength="8">
      </div>

      <button type="submit" class="pro-btn pro-btn-primary">Create Account</button>
    </form>

    <div class="pro-footer-links">
      Already registered? <a href="login.html">Login</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
