  <script>
    const f = document.getElementById('signup-form');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    const btn = document.getElementById('btn');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none'; ok.style.display = 'none';
      btn.disabled = true; btn.innerHTML = 'Creating account…';
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) { err.textContent = error.message; err.style.display = 'block'; btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account'; return; }
      if (data.user) {
        try { await supabaseClient.from('profiles').upsert({ id: data.user.id, name, phone }); } catch {}
      }
      ok.textContent = 'Account created! Check your email for confirmation, then sign in.';
      ok.style.display = 'block';
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      setTimeout(() => location.href = 'login.html', 2200);
    });
  </script>
