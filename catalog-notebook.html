<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Console · Catalog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Google Fonts: Inter for clean UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="catalog-notebook.css" />
</head>
<body class="catalog-body">
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <h1>ONCOST <span class="brand-admin">ADMIN</span></h1>
      </div>
      
      <div class="nav-section">
        <h2 class="nav-title">Catalog Console v1</h2>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">CATALOG</div>
        <a href="#" class="nav-item active"><i class="fas fa-box"></i> Products</a>
        <a href="#" class="nav-item"><i class="fas fa-tags"></i> Pricing Rules</a>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">SALES</div>
        <a href="#" class="nav-item"><i class="fas fa-plus-square"></i> New Quotation</a>
        <a href="#" class="nav-item"><i class="fas fa-file-invoice-dollar"></i> Quotations</a>
        <a href="#" class="nav-item"><i class="fas fa-check-circle"></i> Accepted Sales</a>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">PUBLIC</div>
        <a href="#" class="nav-item"><i class="fas fa-globe"></i> View Catalog</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <div class="breadcrumbs">
          <i class="fas fa-layer-group breadcrumb-icon"></i> ONCOST / <span class="current">Admin Console</span>
        </div>
        <div class="topbar-actions">
          <a href="#" class="public-link">Public catalog <i class="fas fa-external-link-alt"></i></a>
        </div>
      </header>

      <div class="content-wrapper">
        <div class="page-header">
          <div class="header-left">
            <span class="sub-badge">CATALOG</span>
            <h2 class="page-title">Products</h2>
            <p class="page-desc">92 items. Click <strong>Edit Price</strong> to override a price or <strong>Upload Image</strong> to replace the supplier photo.</p>
          </div>
          <div class="header-right">
            <div class="action-row">
              <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;" />
              <button class="btn btn-primary" id="btn-import-pdf"><i class="fas fa-file-pdf"></i> + Import from PDF</button>
              <button class="btn btn-outline" id="btn-sort-code"><i class="fas fa-sort-alpha-down"></i> Code</button>
              <button class="btn btn-outline" id="btn-sort-price-up"><i class="fas fa-arrow-up"></i> Price</button>
              <button class="btn btn-outline" id="btn-sort-price-down"><i class="fas fa-arrow-down"></i> Price</button>
            </div>
            <div class="search-bar">
              <i class="fas fa-search search-icon"></i>
              <input type="text" placeholder="Search..." class="search-input" id="search-input" />
            </div>
          </div>
        </div>

        <div class="product-list" id="product-list">
          <!-- Products will be injected dynamically via JS -->
        </div>
      </div>
    </main>
  </div>
  
  <input type="file" id="image-upload" accept="image/*" style="display: none;" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="catalog-notebook.js"></script>
</body>
</html>
