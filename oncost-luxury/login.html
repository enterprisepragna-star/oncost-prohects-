<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ONCOST Luxury</title>
  <link rel="stylesheet" href="luxury.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--warm-beige) 0%, #FFFFFF 100%);
      padding: 20px;
    }
    .auth-container {
      background: var(--white);
      width: 100%;
      max-width: 460px;
      padding: 48px;
      border-radius: 16px;
      box-shadow: var(--shadow-hover);
      text-align: center;
    }
    .auth-logo {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--deep-maroon);
      letter-spacing: 2px;
      display: block;
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--soft-gold);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .auth-step {
      display: none;
      animation: fadeIn 0.4s ease forwards;
    }
    .auth-step.active {
      display: block;
    }
    .form-group {
      text-align: left;
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 16px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 1rem;
      transition: var(--transition);
      background: var(--warm-beige);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--deep-maroon);
      background: var(--white);
      box-shadow: 0 0 0 4px var(--border-subtle);
    }
    .auth-btn {
      width: 100%;
      padding: 16px;
      background: var(--deep-maroon);
      color: var(--white);
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      letter-spacing: 1px;
      transition: var(--transition);
      margin-top: 10px;
    }
    .auth-btn:hover {
      background: var(--maroon-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(122, 31, 53, 0.2);
    }
    .auth-link {
      display: inline-block;
      margin-top: 24px;
      color: var(--grey-text);
      font-size: 0.9rem;
    }
    .auth-link:hover { color: var(--deep-maroon); }
    .otp-inputs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .otp-inputs input {
      width: 50px;
      height: 60px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid #E0E0E0;
      background: var(--warm-beige);
    }
    .otp-inputs input:focus {
      border-color: var(--deep-maroon);
      background: var(--white);
      outline: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="index.html" class="auth-logo">ONCOST</a>
      <div class="auth-subtitle">Premium Gifting</div>

      <!-- Login Form -->
      <div id="step-login" class="auth-step active">
        <h2 style="font-family: var(--font-heading); color: var(--deep-maroon); margin-bottom: 8px;">Welcome Back</h2>
        <p style="color: var(--grey-text); font-size: 0.95rem; margin-bottom: 32px;">Login to access your premium account.</p>
        
        <form id="login-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="customer@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password" required>
          </div>
          <p id="login-error" style="color: #D32F2F; font-size: 0.85rem; margin-bottom: 16px; display: none;"></p>
          <button type="submit" class="auth-btn">Sign In</button>
          <p style="margin-top: 24px; font-size: 0.9rem; color: var(--grey-text);">
            New customer? <a href="#" class="auth-link" style="margin-top:0;" onclick="goToStep('step-signup')">Create an account</a>
          </p>
        </form>
      </div>

      <!-- Signup Form -->
      <div id="step-signup" class="auth-step">
        <h2 style="font-family: var(--font-heading); color: var(--deep-maroon); margin-bottom: 8px;">Create Account</h2>
        <p style="color: var(--grey-text); font-size: 0.95rem; margin-bottom: 32px;">Set up your luxury account today.</p>
        
        <form id="signup-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signup-email" placeholder="customer@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="At least 6 characters" minlength="6" required>
          </div>
          <p id="signup-error" style="color: #D32F2F; font-size: 0.85rem; margin-bottom: 16px; display: none;"></p>
          <p id="signup-success" style="color: #2E7D32; font-size: 0.85rem; margin-bottom: 16px; display: none;"></p>
          <button type="submit" class="auth-btn">Register Securely</button>
          <p style="margin-top: 24px; font-size: 0.9rem; color: var(--grey-text);">
            Already have an account? <a href="#" class="auth-link" style="margin-top:0;" onclick="goToStep('step-login')">Sign In</a>
          </p>
        </form>
      </div>

    </div>
  </div>

  <script>
    function goToStep(stepId) {
      document.querySelectorAll('.auth-step').forEach(el => el.classList.remove('active'));
      document.getElementById(stepId).classList.add('active');
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('signup-error').style.display = 'none';
    }

    // Check if user is already logged in
    async function checkSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = 'account.html';
      }
    }
    checkSession();

    // Handle Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
      } else {
        window.location.href = 'account.html';
      }
    });

    // Handle Signup
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const errorEl = document.getElementById('signup-error');
      const successEl = document.getElementById('signup-success');
      
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      } else {
        errorEl.style.display = 'none';
        successEl.textContent = 'Registration successful! You can now sign in.';
        successEl.style.display = 'block';
        document.getElementById('signup-form').reset();
      }
    });
  </script>
</body>
</html>
